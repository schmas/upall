# mise tool versions for upall development.
# Install with: mise install
[tools]
go = "1.26.5"       # matches the `go` directive in go.mod
goreleaser = "2"    # release tooling; CI uses goreleaser-action "~> v2"
svu = "3"           # semantic-version util: next tag from conventional commits (used by CI + preview)

# Releases are AUTOMATIC: merging to `main` runs .github/workflows/release.yml,
# which uses svu to bump from conventional commits, then smoke-tests + publishes.
# There is no manual tag step. This task just previews what the next merge to main
# would release (or "no bump" if only chore/docs/ci landed since the last tag).
#   feat: -> minor   fix: -> patch   feat!:/BREAKING CHANGE -> major
[tasks.release-preview]
description = "Preview the version the next merge to main would release (svu), no side effects"
run = '''
set -euo pipefail
current="$(svu current)"; next="$(svu next)"
if [ "${next}" = "${current}" ]; then
  echo "No releasable commits since ${current} — next merge to main will NOT release."
else
  echo "Next merge to main will release ${next} (current: ${current})."
fi
'''
