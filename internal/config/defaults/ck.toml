schema = 1

# ClaudeKit refresh. UPALL_ACTIVE=1 tells ck-update it is nested (it streams
# plain into our pane instead of drawing its own dashboard). Its colored banners
# are rendered faithfully by the VT emulator, so no NO_COLOR override is needed.
[[step]]
key     = "ck"
label   = "ClaudeKit"
detect  = "command -v ck"
run     = ['"$HOME/bin/ck-update"']
order   = 80
timeout = "20m"

[step.env]
UPALL_ACTIVE = "1"
