schema = 1

# ClaudeKit refresh. UPALL_ACTIVE=1 tells ck-update it is nested (it streams
# plain into our pane instead of drawing its own dashboard); NO_COLOR=1 keeps
# its banners from rendering a colored nested UI inside the ck pane.
[[step]]
key     = "ck"
label   = "ClaudeKit"
detect  = "command -v ck"
run     = ['"$HOME/bin/ck-update"']
order   = 80
timeout = "20m"

[step.env]
UPALL_ACTIVE = "1"
NO_COLOR     = "1"
