schema = 1

# AgentKit refresh (successor to ClaudeKit). UPALL_ACTIVE=1 tells ak-update it is
# nested (it streams plain into our pane instead of drawing its own dashboard).
# Its colored banners are rendered faithfully by the VT emulator, so no NO_COLOR
# override is needed.
[[step]]
key     = "ak"
label   = "AgentKit"
detect  = "command -v ak"
run     = ['"$HOME/bin/ak-update"']
order   = 80
timeout = "20m"

[step.env]
UPALL_ACTIVE = "1"
