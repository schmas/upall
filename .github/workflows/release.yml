name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Auto-latest install means a broken release reaches every machine, so each
  # cross-compiled artifact is smoke-tested before the release is published.
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: docker/setup-qemu-action@v3
      - name: Cross-compile all targets (CGO-free)
        run: |
          set -euxo pipefail
          for os in darwin linux; do
            for arch in amd64 arm64; do
              CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -o "dist/upall_${os}_${arch}" ./cmd/upall
            done
          done
      - name: Smoke-test linux/amd64 (native)
        run: |
          set -euxo pipefail
          ./dist/upall_linux_amd64 --version
          ./dist/upall_linux_amd64 --list
      - name: Smoke-test linux/arm64 (qemu)
        run: |
          set -euxo pipefail
          docker run --rm --platform linux/arm64 -v "$PWD/dist":/d arm64v8/alpine:3 \
            sh -c '/d/upall_linux_arm64 --version && /d/upall_linux_arm64 --list'

  release:
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
