name: release

# Auto-release on merge to main. The `version` job computes the next semver from
# conventional commits (svu); if nothing releasable landed since the last tag it
# skips. Otherwise smoke-test → goreleaser publish → push the tag — all in ONE run,
# so no PAT is needed (there is no tag-push trigger to recurse into).
on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.svu.outputs.release }}
      version: ${{ steps.svu.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v2 # installs svu (+ go, goreleaser) pinned in mise.toml
      - id: svu
        name: Compute next version from conventional commits
        run: |
          set -euo pipefail
          current="$(svu current)"
          next="$(svu next)"
          echo "current=${current} next=${next}"
          if [ "${next}" = "${current}" ]; then
            echo "No releasable commits since ${current}; skipping release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "version=${next}" >> "$GITHUB_OUTPUT"
          fi

  # Auto-latest install means a broken release reaches every machine, so each
  # cross-compiled artifact is smoke-tested before the release is published.
  smoke:
    needs: version
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: docker/setup-qemu-action@v3
      - name: Cross-compile all targets (CGO-free)
        run: |
          set -euxo pipefail
          for os in darwin linux; do
            for arch in amd64 arm64; do
              CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -o "dist/upall_${os}_${arch}" ./cmd/upall
            done
          done
      - name: Smoke-test linux/amd64 (native)
        run: |
          set -euxo pipefail
          ./dist/upall_linux_amd64 --version
          ./dist/upall_linux_amd64 --list
      - name: Smoke-test linux/arm64 (qemu)
        run: |
          set -euxo pipefail
          docker run --rm --platform linux/arm64 -v "$PWD/dist":/d arm64v8/alpine:3 \
            sh -c '/d/upall_linux_arm64 --version && /d/upall_linux_arm64 --list'

  release:
    needs: [version, smoke]
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Tag and push ${{ needs.version.outputs.version }}
        # Must be pushed before goreleaser runs: its changelog step (changelog.use:
        # github) calls GitHub's compare API, which 404s on a tag that only exists locally.
        run: |
          git tag "${{ needs.version.outputs.version }}"
          git push origin "${{ needs.version.outputs.version }}"
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean # reads the tag pushed above
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
